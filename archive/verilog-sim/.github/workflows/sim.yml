name: RTL Simulation

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  iverilog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Icarus Verilog
        run: sudo apt-get update && sudo apt-get install -y iverilog

      - name: Build ROM
        run: python3 tools/microasm.py lib/inc_r1.micro -o sim

      - name: ALU testbench
        run: make sim-alu

      - name: Core testbench
        run: make sim-core

      - name: Microasm smoke
        run: python3 tools/microasm.py lib/add_r0_r1.micro -o /tmp/plover_rom
