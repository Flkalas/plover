name: Hardware Simulation (hwsim)

on:
  push:
    branches: [master, main]
    paths:
      - "hw/**"
      - "hwsim/**"
      - "cyclesim/**"
      - "plover_vm/**"
      - "hw/logic/**"
      - "hw/micro/**"
      - "tests/test_*parity*.py"
      - "tests/test_alu_netlist_parity.py"
      - "docs/hw-sim.md"
      - "docs/cyclesim.md"
      - "docs/hw-schematic.md"
      - ".github/workflows/hw-sim.yml"
  pull_request:
    branches: [master, main]
    paths:
      - "hw/**"
      - "hwsim/**"
      - "cyclesim/**"
      - "plover_vm/**"
      - "hw/logic/**"
      - "hw/micro/**"
      - "tests/test_*parity*.py"
      - "tests/test_alu_netlist_parity.py"
      - "docs/hw-sim.md"
      - "docs/cyclesim.md"
      - "docs/hw-schematic.md"
      - ".github/workflows/hw-sim.yml"

jobs:
  hwsim:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate netlists
        shell: bash
        run: |
          python -m hwsim validate hw/netlist/blocks/clock.yaml
          python -m hwsim validate hw/netlist/blocks/alu283.yaml
          python -m hwsim validate hw/netlist/blocks/reg574.yaml

      - name: Run all hwsim tests
        shell: bash
        run: |
          python -m hwsim run --all

      - name: Run cyclesim structural tests
        shell: bash
        run: |
          python -m cyclesim run --all

      - name: Simulator parity (cyclesim / netlist / VM)
        shell: bash
        run: |
          python -m pytest tests/test_cyclesim_parity.py tests/test_alu_netlist_parity.py -q

      - name: KiCad netlist diff (clock sample)
        shell: bash
        run: |
          python -m hwsim diff-kicad hw/kicad/export/clock.net hw/netlist/blocks/clock.yaml

  hwsim-ubuntu-artifacts:
    runs-on: ubuntu-latest
    needs: hwsim
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Generate reports
        run: |
          python -m hwsim run --all
      - uses: actions/upload-artifact@v4
        with:
          name: hwsim-reports
          path: build/hwsim/
