name: cyclesim

on:
  push:
    paths:
      - "simulators/**"
      - "cpld_fsm/hdl/**"
      - ".github/workflows/cyclesim.yml"
  pull_request:
    paths:
      - "simulators/**"
      - "cpld_fsm/hdl/**"
      - ".github/workflows/cyclesim.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pytest
      - run: pytest simulators/cyclesim/tests cpld_fsm/hdl/tests -q
        timeout-minutes: 5
