name: Reference governance

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  reference:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: No docs/ directory in active tree
        run: |
          if [ -d docs ]; then
            echo "::error::docs/ must not exist — use reference/ at repository root"
            exit 1
          fi

      - name: Forbidden patterns in reference docs and whitepaper
        run: |
          set -euo pipefail
          patterns=(
            'hwsim'
            'cyclesim'
            'pytest'
            'python -m'
            'python tools/'
            'tools/'
            'cargo run'
            'plover_vm'
            '--engine micro'
            '--engine macro'
            '--engine fast'
          )
          failed=0
          for pat in "${patterns[@]}"; do
            if rg -n --glob '*.md' "$pat" reference/ plover-whitepaper.md; then
              echo "::error::Forbidden pattern in reference docs: $pat"
              failed=1
            fi
          done
          if [ "$failed" -ne 0 ]; then
            exit 1
          fi
          echo "reference scrub OK"
