name: Rust VM (plover_vm)

on:
  push:
    branches: [master, main]
    paths:
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "hw/scenarios/vm/**"
      - "hw/fixtures/**"
      - "docs/vm-rust.md"
      - "docs/dos-shell.md"
      - "docs/forth-system.md"
      - ".github/workflows/rust-vm.yml"
  pull_request:
    branches: [master, main]
    paths:
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "hw/scenarios/vm/**"
      - "hw/fixtures/**"
      - "docs/vm-rust.md"
      - "docs/dos-shell.md"
      - "docs/forth-system.md"
      - ".github/workflows/rust-vm.yml"

jobs:
  rust-vm:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: dtolnay/rust-toolchain@stable

      - name: Install MSVC Build Tools linker
        uses: ilammy/msvc-dev-shell@v1

      - name: cargo test --workspace
        run: cargo test --workspace

      - name: plover_core engine parity
        run: cargo test -p plover_core

      - name: plover_forth + plover_os
        run: cargo test -p plover_forth -p plover_os

      - name: pytest regression (Python oracle)
        run: python -m pytest tests/ -q
