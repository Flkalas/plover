<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>cyclesim block schematic</title>
  <link rel="stylesheet" href="block-viewer.css">
</head>
<body>
  <header id="header">
    <h1 id="block-title">block</h1>
    <p id="block-desc"></p>
    <div id="summary" class="summary"></div>
  </header>

  <div id="toolbar">
    <input type="search" id="search" placeholder="Search net or ref…" autocomplete="off">
    <button type="button" id="btn-fit">Fit</button>
    <button type="button" id="btn-zin">+</button>
    <button type="button" id="btn-zout">−</button>
    <button type="button" id="btn-reset">100%</button>
    <span id="zoom-label">100%</span>
  </div>

  <div id="main">
    <div id="wrap">
      <div id="stage">/* EMBED_SVG */</div>
    </div>
    <aside id="inspector">
      <h2>Inspector</h2>
      <p id="inspector-empty" class="muted">Click a net, wire, or symbol.</p>
      <div id="inspector-body" hidden></div>
    </aside>
  </div>

  <script>
    const MANIFEST = /* EMBED_MANIFEST */;
  </script>
  <script src="block-viewer.js"></script>
</body>
</html>
