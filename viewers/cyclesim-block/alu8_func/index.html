<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>cyclesim block schematic</title>
  <style>
:root {
  color-scheme: dark;
  --bg: #0d1117;
  --surface: #161b22;
  --border: #30363d;
  --text: #e6edf3;
  --muted: #8b949e;
  --accent: #58a6ff;
  --highlight: #f0883e;
}

* {
  box-sizing: border-box;
}

html,
body {
  margin: 0;
  height: 100%;
  overflow: hidden;
  font-family: system-ui, "Segoe UI", sans-serif;
  background: var(--bg);
  color: var(--text);
}

header {
  padding: 0.6rem 1rem;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}

h1 {
  margin: 0;
  font-size: 1.1rem;
  font-weight: 600;
}

#block-desc {
  margin: 0.2rem 0 0.4rem;
  font-size: 0.82rem;
  color: var(--muted);
}

.summary {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem 1rem;
  font-size: 0.78rem;
  color: var(--muted);
}

.summary strong {
  color: var(--text);
}

#toolbar {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.45rem 1rem;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}

#search {
  flex: 1;
  min-width: 8rem;
  max-width: 18rem;
  padding: 0.35rem 0.5rem;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: var(--bg);
  color: var(--text);
  font-size: 0.85rem;
}

#toolbar button {
  padding: 0.3rem 0.55rem;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: #21262d;
  color: var(--text);
  cursor: pointer;
  font-size: 0.85rem;
}

#toolbar button:hover {
  border-color: var(--accent);
}

#zoom-label {
  font-size: 0.78rem;
  color: var(--muted);
  min-width: 3rem;
}

.zoom-hint {
  font-size: 0.72rem;
  color: var(--muted);
  margin-left: auto;
}

#main {
  display: flex;
  height: calc(100% - 7.5rem);
}

#wrap {
  flex: 1;
  overflow: auto;
  cursor: grab;
  background: var(--bg);
}

#wrap.panning {
  cursor: grabbing;
  user-select: none;
}

#spacer {
  position: relative;
  min-width: 100%;
  min-height: 100%;
}

#stage {
  transform-origin: 0 0;
  position: absolute;
  left: 8px;
  top: 8px;
  display: inline-block;
}

#inspector {
  width: 16rem;
  flex-shrink: 0;
  border-left: 1px solid var(--border);
  background: var(--surface);
  padding: 0.75rem;
  overflow-y: auto;
  font-size: 0.82rem;
}

#inspector h2 {
  margin: 0 0 0.5rem;
  font-size: 0.9rem;
}

.muted {
  color: var(--muted);
  font-style: italic;
}

.insp-title {
  font-weight: 600;
  font-family: ui-monospace, monospace;
  margin-bottom: 0.35rem;
}

.insp-meta {
  color: var(--muted);
  font-size: 0.78rem;
  margin-bottom: 0.5rem;
}

.insp-list {
  margin: 0;
  padding-left: 1.1rem;
}

.insp-list li {
  margin-bottom: 0.2rem;
  font-family: ui-monospace, monospace;
  font-size: 0.78rem;
}

.flash .wire-seg {
  stroke: var(--highlight) !important;
  stroke-width: 2.5 !important;
  opacity: 1 !important;
}

.flash .net-junction {
  fill: var(--highlight) !important;
}

.flash .wire-bend,
.flash .wire-endpoint {
  fill: var(--highlight) !important;
}

</style>
</head>

_3": {"part": "74HC153", "pins": {"A": "net_a3", "B": "net_b3", "1C0": "net_lgc0", "1C1": "net_lgc1", "1C2": "net_lgc2", "1C3": "net_lgc3", "2C0": "net_bctrl0", "2C1": "net_bctrl1", "2C2": "net_bctrl2", "2C3": "net_bctrl3", "1Y": "net_y_logic3", "2Y": "net_b_add3"}, "unit": {"id": "153_bit_3", "kind": "hc153", "label": "74HC153[3]", "stage": 2}}, "U_ALU_153_4": {"part": "74HC153", "pins": {"A": "net_a4", "B": "net_b4", "1C0": "net_lgc0", "1C1": "net_lgc1", "1C2": "net_lgc2", "1C3": "net_lgc3", "2C0": "net_bctrl0", "2C1": "net_bctrl1", "2C2": "net_bctrl2", "2C3": "net_bctrl3", "1Y": "net_y_logic4", "2Y": "net_b_add4"}, "unit": {"id": "153_bit_4", "kind": "hc153", "label": "74HC153[4]", "stage": 2}}, "U_ALU_153_5": {"part": "74HC153", "pins": {"A": "net_a5", "B": "net_b5", "1C0": "net_lgc0", "1C1": "net_lgc1", "1C2": "net_lgc2", "1C3": "net_lgc3", "2C0": "net_bctrl0", "2C1": "net_bctrl1", "2C2": "net_bctrl2", "2C3": "net_bctrl3", "1Y": "net_y_logic5", "2Y": "net_b_add5"}, "unit": {"id": "153_bit_5", "kind": "hc153", "label": "74HC153[5]", "stage": 2}}, "U_ALU_153_6": {"part": "74HC153", "pins": {"A": "net_a6", "B": "net_b6", "1C0": "net_lgc0", "1C1": "net_lgc1", "1C2": "net_lgc2", "1C3": "net_lgc3", "2C0": "net_bctrl0", "2C1": "net_bctrl1", "2C2": "net_bctrl2", "2C3": "net_bctrl3", "1Y": "net_y_logic6", "2Y": "net_b_add6"}, "unit": {"id": "153_bit_6", "kind": "hc153", "label": "74HC153[6]", "stage": 2}}, "U_ALU_153_7": {"part": "74HC153", "pins": {"A": "net_a7", "B": "net_b7", "1C0": "net_lgc0", "1C1": "net_lgc1", "1C2": "net_lgc2", "1C3": "net_lgc3", "2C0": "net_bctrl0", "2C1": "net_bctrl1", "2C2": "net_bctrl2", "2C3": "net_bctrl3", "1Y": "net_y_logic7", "2Y": "net_b_add7"}, "unit": {"id": "153_bit_7", "kind": "hc153", "label": "74HC153[7]", "stage": 2}}, "U_ALU_283_LO": {"part": "74HC283", "pins": {"CIN": "net_cin", "COUT": "net_c_lo", "A0": "net_a0", "B0": "net_b_add0", "S0": "net_sum0", "A1": "net_a1", "B1": "net_b_add1", "S1": "net_sum1", "A2": "net_a2", "B2": "n et_bctrl3"], "edge": "left", "corridor": "below_153"}, "ctrl": {"nets": ["net_cin", "net_153_s0", "net_153_s1"], "edge": "left"}, "y_mux": {"nets": ["net_y_mux_sel"], "edge": "left", "corridor": "below_stack"}, "y": {"nets": ["net_y0", "net_y1", "net_y2", "net_y3", "net_y4", "net_y5", "net_y6", "net_y7"], "edge": "right", "align": "row"}, "flags": {"nets": ["net_cmp_z", "net_cmp_c_ge", "net_c_hi"], "edge": "right"}}, "orphan_ports": ["net_153_s0", "net_153_s1", "net_cmp_z", "net_cmp_c_ge"]}};
  </script>
  <script>
(function () {
  "use strict";

  const data = typeof MANIFEST !== "undefined" ? MANIFEST : null;
  if (!data) {
    document.body.innerHTML = "<p>No manifest embedded.</p>";
    return;
  }

  const MIN_SCALE = 0.15;
  const MAX_SCALE = 4;
  const ZOOM_STEP = 1.15;

  const netByName = Object.fromEntries(data.nets.map((n) => [n.name, n]));
  let scale = 1;
  let panning = false;
  let panStart = { x: 0, y: 0, scrollLeft: 0, scrollTop: 0 };

  const el = {
    title: document.getElementById("block-title"),
    desc: document.getElementById("block-desc"),
    summary: document.getElementById("summary"),
    search: document.getElementById("search"),
    wrap: document.getElementById("wrap"),
    spacer: document.getElementById("spacer"),
    stage: document.getElementById("stage"),
    inspectorEmpty: document.getElementById("inspector-empty"),
    inspectorBody: document.getElementById("inspector-body"),
    zoomLabel: document.getElementById("zoom-label"),
  };

  function baseSize() {
    if (data.schematic) {
      return { w: data.schematic.width, h: data.schematic.height };
    }
    const svg = el.stage.querySelector("svg");
    if (!svg) return { w: 800, h: 600 };
    return {
      w: parseFloat(svg.getAttribute("width")) || 800,
      h: parseFloat(svg.getAttribute("height")) || 600,
    };
  }

  function clampScale(s) {
    return Math.min(MAX_SCALE, Math.max(MIN_SCALE, s));
  }

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function applyScale() {
    const { w, h } = baseSize();
    el.stage.style.transform = "scale(" + scale + ")";
    el.spacer.style.width = Math.ceil(w * scale + 16) + "px";
    el.spacer.style.height = Math.ceil(h * scale + 16) + "px";
    el.zoomLabel.textContent = Math.round(scale * 100) + "%";
  }

  function zoomBy(factor, clientX, clientY) {
    const prev = scale;
    const next = clampScale(prev * factor);
    if (next === prev) return;

    const rect = el.wrap.getBoundingClientRect();
    const px = clientX !== undefined ? clientX - rect.left + el.wrap.scrollLeft : el.wrap.scrollLeft + el.wrap.clientWidth / 2;
    const py = clientY !== undefined ? clientY - rect.top + el.wrap.scrollTop : el.wrap.scrollTop + el.wrap.clientHeight / 2;

    scale = next;
    applyScale();

    const ratio = next / prev;
    el.wrap.scrollLeft = px * ratio - (clientX !== undefined ? clientX - rect.left : el.wrap.clientWidth / 2);
    el.wrap.scrollTop = py * ratio - (clientY !== undefined ? clientY - rect.top : el.wrap.clientHeight / 2);
  }

  function zoomIn(clientX, clientY) {
    zoomBy(ZOOM_STEP, clientX, clientY);
  }

  function zoomOut(clientX, clientY) {
    zoomBy(1 / ZOOM_STEP, clientX, clientY);
  }

  function zoomReset() {
    scale = 1;
    applyScale();
    el.wrap.scrollLeft = 0;
    el.wrap.scrollTop = 0;
  }

  function zoomFit() {
    const { w, h } = baseSize();
    const pad = 24;
    const sx = (el.wrap.clientWidth - pad) / w;
    const sy = (el.wrap.clientHeight - pad) / h;
    scale = clampScale(Math.min(sx, sy, 1.5));
    applyScale();
    el.wrap.scrollLeft = 0;
    el.wrap.scrollTop = 0;
  }

  function clearHighlight() {
    document.querySelectorAll(".net.highlight, .symbol.highlight").forEach((n) => {
      n.classList.remove("highlight");
    });
  }

  function highlightNetName(net) {
    clearHighlight();
    document.querySelectorAll('.net[data-net="' + CSS.escape(net) + '"]').forEach((g) => {
      g.classList.add("highlight");
    });
    showNetInspector(net);
  }

  function highlightRefName(ref) {
    clearHighlight();
    document.querySelectorAll('.symbol[data-ref="' + CSS.escape(ref) + '"]').forEach((g) => {
      g.classList.add("highlight");
    });
    showRefInspector(ref);
  }

  function showNetInspector(netName) {
    const net = netByName[netName];
    if (!net) return;
    el.inspectorEmpty.hidden = true;
    el.inspectorBody.hidden = false;
    const probes =
      net.probes && net.probes.length
        ? " · probes: " + net.probes.join(", ")
        : "";
    const port = net.is_port ? " · port" : "";
    const items = net.connections
      .map(
        (c) =>
          "<li>" +
          escapeHtml(c.ref + "." + c.pin) +
          " (" +
          escapeHtml(c.dir) +
          ")</li>"
      )
      .join("");
    el.inspectorBody.innerHTML =
      '<div class="insp-title">' +
      escapeHtml(netName) +
      "</div>" +
      '<div class="insp-meta">width ' +
      net.width +
      port +
      probes +
      (net.conflict ? " · multi-drive" : "") +
      "</div>" +
      "<ul class=\"insp-list\">" +
      items +
      "</ul>";
  }

  function showRefInspector(ref) {
    const inst = data.instances[ref];
    if (!inst) return;
    el.inspectorEmpty.hidden = true;
    el.inspectorBody.hidden = false;
    const unit = inst.unit ? "<div class=\"insp-meta\">" + escapeHtml(inst.unit.label) + "</div>" : "";
    const pins = Object.entries(inst.pins)
      .sort((a, b) => a[0].localeCompare(b[0]))
      .map(
        ([pin, net]) =>
          "<li>" + escapeHtml(pin) + " → " + escapeHtml(net) + "</li>"
      )
      .join("");
    el.inspectorBody.innerHTML =
      '<div class="insp-title">' +
      escapeHtml(ref) +
      "</div>" +
      '<div class="insp-meta">' +
      escapeHtml(inst.part) +
      "</div>" +
      unit +
      "<ul class=\"insp-list\">" +
      pins +
      "</ul>";
  }

  function flashNet(net) {
    highlightNetName(net);
    const hub = document.querySelector('.net-junction[data-net="' + CSS.escape(net) + '"]');
    if (hub) {
      const g = hub.closest(".net");
      if (g) {
        g.classList.add("flash");
        setTimeout(() => g.classList.remove("flash"), 1200);
      }
      const { w, h } = baseSize();
      const sx = parseFloat(hub.getAttribute("cx")) || 0;
      const sy = parseFloat(hub.getAttribute("cy")) || 0;
      el.wrap.scrollLeft = sx * scale - el.wrap.clientWidth / 2;
      el.wrap.scrollTop = sy * scale - el.wrap.clientHeight / 2;
    }
  }

  function renderHeader() {
    el.title.textContent = data.block;
    el.desc.textContent = data.description || "";
    const s = data.summary;
    el.summary.innerHTML =
      "<span><strong>" +
      s.instance_count +
      "</strong> symbols</span>" +
      "<span><strong>" +
      s.net_count +
      "</strong> nets</span>";
  }

  function bindSchematic() {
    el.stage.querySelectorAll(".wire-hit, .net-junction, .wire-bend, .wire-endpoint, .net-label").forEach((node) => {
      node.addEventListener("click", (e) => {
        e.stopPropagation();
        const net = node.getAttribute("data-net");
        if (net) highlightNetName(net);
      });
    });
    el.stage.querySelectorAll(".symbol").forEach((sym) => {
      sym.addEventListener("click", (e) => {
        e.stopPropagation();
        const ref = sym.getAttribute("data-ref");
        if (ref) highlightRefName(ref);
      });
    });
    el.stage.querySelectorAll(".global-label").forEach((lbl) => {
      lbl.addEventListener("click", (e) => {
        e.stopPropagation();
        const net = lbl.getAttribute("data-net");
        if (net) highlightNetName(net);
      });
    });
  }

  el.search.addEventListener("keydown", (e) => {
    if (e.key !== "Enter") return;
    const q = el.search.value.trim().toLowerCase();
    if (!q) return;
    const net = data.nets.find((n) => n.name.toLowerCase().includes(q));
    if (net) {
      flashNet(net.name);
      return;
    }
    const ref = Object.keys(data.instances).find((r) => r.toLowerCase().includes(q));
    if (ref) highlightRefName(ref);
  });

  document.getElementById("btn-zin").addEventListener("click", () => {
    const r = el.wrap.getBoundingClientRect();
    zoomIn(r.left + r.width / 2, r.top + r.height / 2);
  });
  document.getElementById("btn-zout").addEventListener("click", () => {
    const r = el.wrap.getBoundingClientRect();
    zoomOut(r.left + r.width / 2, r.top + r.height / 2);
  });
  document.getElementById("btn-reset").addEventListener("click", zoomReset);
  document.getElementById("btn-fit").addEventListener("click", zoomFit);

  el.wrap.addEventListener(
    "wheel",
    (e) => {
      e.preventDefault();
      const factor = e.deltaY < 0 ? 1.1 : 1 / 1.1;
      zoomBy(factor, e.clientX, e.clientY);
    },
    { passive: false }
  );

  el.wrap.addEventListener("mousedown", (e) => {
    if (e.button !== 0) return;
    if (e.target.closest(".wire-hit, .symbol, .net-junction, .wire-bend, .wire-endpoint, .global-label")) return;
    panning = true;
    panStart = {
      x: e.clientX,
      y: e.clientY,
      scrollLeft: el.wrap.scrollLeft,
      scrollTop: el.wrap.scrollTop,
    };
    el.wrap.classList.add("panning");
  });

  window.addEventListener("mousemove", (e) => {
    if (!panning) return;
    el.wrap.scrollLeft = panStart.scrollLeft - (e.clientX - panStart.x);
    el.wrap.scrollTop = panStart.scrollTop - (e.clientY - panStart.y);
  });

  window.addEventListener("mouseup", () => {
    panning = false;
    el.wrap.classList.remove("panning");
  });

  window.addEventListener("keydown", (e) => {
    if (e.target.matches("input, textarea")) return;
    if (e.key === "+" || e.key === "=") {
      e.preventDefault();
      zoomIn();
    } else if (e.key === "-" || e.key === "_") {
      e.preventDefault();
      zoomOut();
    } else if (e.key === "0") {
      e.preventDefault();
      zoomFit();
    }
  });

  renderHeader();
  bindSchematic();
  zoomFit();
})();
