version: 1
part: 74HC153
aliases: [SN74HC153N, CD74HC153E]
package:
  name: DIP-16
  pins: 16
  view: top_notch_up
sources:
  - org: NXP
    doc: 74HC/HCT153 — Dual 4-input multiplexer
    url: https://assets.nexperia.com/documents/data-sheet/74HC_HCT153.pdf
    table: "Pin description Table 2"
  - org: Texas Instruments
    doc: SN74HC153
    url: https://www.ti.com/lit/ds/symlink/sn74hc153.pdf
    note: TI logic symbol uses 1G/2G, A, B, 1C0..1C3 (matches hwsim netlist)
pins:
  "1": { sym: 1G, aliases: [1E, n1E], role: input, desc: "Mux 1 output enable (active LOW)" }
  "2": { sym: B, aliases: [S1], role: input, desc: Common select bit 1 (MSB) }
  "3": { sym: 1C3, aliases: [1I3], role: input, desc: Mux 1 data input 3 }
  "4": { sym: 1C2, aliases: [1I2], role: input, desc: Mux 1 data input 2 }
  "5": { sym: 1C1, aliases: [1I1], role: input, desc: Mux 1 data input 1 }
  "6": { sym: 1C0, aliases: [1I0], role: input, desc: Mux 1 data input 0 }
  "7": { sym: 1Y, role: output, desc: Mux 1 output }
  "8": { sym: GND, role: power, desc: Ground }
  "9": { sym: 2Y, role: output, desc: Mux 2 output }
  "10": { sym: 2C0, aliases: [2I0], role: input, desc: Mux 2 data input 0 }
  "11": { sym: 2C1, aliases: [2I1], role: input, desc: Mux 2 data input 1 }
  "12": { sym: 2C2, aliases: [2I2], role: input, desc: Mux 2 data input 2 }
  "13": { sym: 2C3, aliases: [2I3], role: input, desc: Mux 2 data input 3 }
  "14": { sym: A, aliases: [S0], role: input, desc: Common select bit 0 (LSB) }
  "15": { sym: 2G, aliases: [2E, n2E], role: input, desc: "Mux 2 output enable (active LOW)" }
  "16": { sym: VCC, role: power, desc: Positive supply }
plover_netlist:
  note: alu8 ties 1G/2G to GND (always enabled). Netlist uses TI-style 1C* names.
  roles:
    U_ALU_153_B_0..3: B-path mux — A=`net_b_sel`, B=`net_b_const_sel`; C0=B, C1=~B, C2=INC, C3=DEC
    U_ALU_153_L_0..3: Gigatron logic — mux1/mux2 per DIP (hwsim slices L_2n/L_2n+1); A/B=operand sel, C*=net_lgc0..3
