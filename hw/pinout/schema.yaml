version: 1
description: >
  Physical DIP pin maps for Plover 74HC/LVC breadboard BOM.
  Logical names match hwsim netlist symbols unless noted under plover_netlist.
  Pin 1 = lower-left with notch up (JEDEC DIP top view, counter-clockwise).

required_fields:
  - version
  - part
  - package
  - sources
  - pins

package_fields:
  name: e.g. DIP-16
  pins: pin count
  view: top_notch_up

pin_entry_fields:
  sym: primary symbol (datasheet)
  aliases: optional alternate names (vendor variants)
  role: power | input | output | i/o | nc
  desc: short human description

optional_sections:
  gates: for multi-gate 14-pin packages (gate id -> pin symbols)
  plover_netlist: maps netlist pin names to DIP pin numbers or datasheet symbols
