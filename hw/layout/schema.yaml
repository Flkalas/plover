version: 1
description: |
  Optimized physical layout. Phase 1 (default): abstract coordinates + gate_assign.
  Phase 2 (--snap-boards): mb102 / perfboard hole coordinates.

fields:
  version: schema version
  block: netlist block name
  source: source netlist path
  mode: assembly | logical
  variants:
    io-left | io-right:
      io_panel:
        side: left | right
        sections: list of { name, part, nets[] }
      packages:
        <package_id>:
          abstract: { x_mm, y_mm }
          mb102: { block, anchor_row, anchor_col, notch }
          perfboard: { row, col, notch }
      gate_assign:
        <part>:
          <package_id>:
            <slot_key>: <instance ref>
      metrics:
        total_wire_mm: { abstract, perfboard, mb102 }
        crossings: int
        critical_sub_path_mm: float
