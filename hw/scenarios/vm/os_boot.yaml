kind: kernel
actions:
  - type: set_slots
    slots:
      "0": 161
      "1": 195
      "2": 212
  - type: stage0_load_sector0
    image: hw/fixtures/vfdd/dos_boot.img
    sectors: 64
  - type: boot
expect:
  output_contains:
    - bios_stage0_ok
    - kernel_boot
    - DEV slot0 sig=A1 drv=vfdd
    - DEV slot1 sig=C3 drv=gpio
    - DEV slot2 sig=D4 drv=serial
    - kernel_help

