name: hid_smoke
kind: hid
description: HID keyboard inject + poll + read mailbox smoke

actions:
  - type: hid_inject_mouse
    buttons: 1
    dx: -2
    dy: 3
  - type: run_pls
    path: hw/fixtures/sw/hid_smoke.pls
    origin: 0x00E0
    max_steps: 200
  - type: hid_read_mouse

expect:
  key_queue: 0
  last_key: 0x41
  key_pending: false
  mouse_event:
    buttons: 1
    dx: -2
    dy: 3
