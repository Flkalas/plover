name: apu_smoke
kind: apu
description: APU PSG ch0 1 kHz square + mailbox smoke

actions:
  - type: apu_set_ctrl
    vol: 15
    mute: false
  - type: apu_ch_write
    ch: 0
    period: 22
    vol: 15
    wave: 1
  - type: apu_sync
  - type: run_pls
    path: hw/fixtures/sw/apu_smoke.pls
    origin: 0x00E0
    max_steps: 200

expect:
  ch0_period: 22
  ch0_vol: 15
  master_vol: 15
  mix_contains_freq: 1000
  mix_samples: 2205
