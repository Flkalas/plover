version: 1
block: clock
instances:
  - ref: U_CLK_OSC
    part: OSC_4M
    pins:
      OUT: net_osc
      VCC: pwr_vcc
      GND: pwr_gnd
  - ref: U_CLK_74
    part: 74HC74
    pins:
      1CP: net_osc
      1D: net_clk2_n
      1Q: net_clk2
      1QN: net_clk2_n
      1RD: pwr_vcc
      1SD: pwr_vcc
      VCC: pwr_vcc
      GND: pwr_gnd
nets:
  - name: net_osc
    width: 1
    probes: [osc]
  - name: net_clk2
    width: 1
    probes: [clk2]
  - name: net_clk2_n
    width: 1
  - name: pwr_vcc
    width: 1
  - name: pwr_gnd
    width: 1
