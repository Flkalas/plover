version: 1
description: Plover hwsim netlist block schema

required_top_level:
  - version
  - block
  - instances
  - nets

instance_fields:
  ref: Designator (e.g. U_CLK_74)
  part: BOM part name (e.g. 74HC74)
  pins: map of pin name to net name

net_fields:
  name: net identifier
  width: bit width (default 1)
  probes: optional list of probe aliases for waveform dump

pin_rules:
  power_pins:
    - VCC
    - VDD
    - GND
    - VSS
  type_power: excluded from connectivity checks
