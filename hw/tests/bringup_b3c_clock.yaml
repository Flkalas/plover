netlist: ../netlist/blocks/alu_b3_clock.yaml
timing: max
duration_ns: 2000
stimulus:
  - at_ns: 0
    set:
      net_a0: 0
      net_a1: 1
      net_a2: 0
      net_a3: 0
      net_a4: 1
      net_a5: 0
      net_a6: 0
      net_a7: 0
      net_b0: 0
      net_b1: 0
      net_b2: 1
      net_b3: 0
      net_b4: 1
      net_b5: 1
      net_b6: 0
      net_b7: 0
      net_sub_en: 1
      net_cin: 1
      net_153_s0: 0
      net_153_s1: 0
      net_b_sel: 1
      net_b_const_sel: 0
      net_c3_sel: 0
      net_b_const_bit1: 0
      net_b_const_bit2: 0
      net_b_const_bit3: 0
      net_b_const_bit4: 0
      net_b_const_bit5: 0
      net_b_const_bit6: 0
      net_b_const_bit7: 0
expect:
  - at_ns: 400
    net_y0: 0
    net_y1: 1
    net_y7: 1
  - at_ns: 650
    net_q0: 0
    net_q1: 1
    net_q7: 1
  - at_ns: 1150
    net_q0: 0
    net_q1: 1
    net_q7: 1
checks:
  - type: frequency
    signal: net_clk2
    target_hz: 2000000
    tolerance_pct: 5
  - type: setup_hold
  - type: slack
    path: [U_ALU_153_0.1Y, U_REG_574_ACC.D0, U_REG_574_ACC.CP, U_REG_574_ACC.Q0]
    budget_ns: 250
    min_slack_ns: 0
