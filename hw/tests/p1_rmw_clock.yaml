netlist: ../netlist/blocks/cpu_datapath_p1_clock.yaml
timing: max
duration_ns: 2500
stimulus:
  - at_ns: 0
    set:
      net_cmp_n: 1
      net_alu_op0: 0
      net_alu_op1: 0
      net_alu_op2: 0
      net_alu_op3: 0
      net_bus_en0: 0
      net_bus_en1: 0
      net_dst_reg0: 0
      net_dst_reg1: 0
      net_src_reg0: 0
      net_src_reg1: 0
  - at_ns: 500
    set:
      net_alu_op0: 1
      net_alu_op1: 0
      net_alu_op2: 0
      net_alu_op3: 1
      net_bus_en0: 0
      net_bus_en1: 0
      net_dst_reg0: 0
      net_dst_reg1: 1
      net_src_reg0: 0
      net_src_reg1: 1
  - at_ns: 1000
    set:
      net_alu_op0: 1
      net_alu_op1: 0
      net_alu_op2: 0
      net_alu_op3: 1
      net_bus_en0: 0
      net_bus_en1: 0
      net_dst_reg0: 0
      net_dst_reg1: 1
      net_src_reg0: 0
      net_src_reg1: 1
  - at_ns: 1500
    set:
      net_alu_op0: 1
      net_alu_op1: 0
      net_alu_op2: 0
      net_alu_op3: 0
      net_bus_en0: 0
      net_bus_en1: 0
      net_dst_reg0: 0
      net_dst_reg1: 1
      net_src_reg0: 0
      net_src_reg1: 0
expect:
  - at_ns: 1900
    net_r2_q0: 0
    net_r2_q1: 1
    net_r2_q2: 0
    net_r2_q3: 0
    net_r2_q4: 0
    net_r2_q5: 0
    net_r2_q6: 0
    net_r2_q7: 0
checks:
  - type: frequency
    signal: net_clk2
    target_hz: 2000000
    tolerance_pct: 5
  - type: setup_hold
  - type: slack
    path: [U_ALU_153_0.1Y, U_REG_R2.D0, U_REG_R2.CP, U_REG_R2.Q0]
    budget_ns: 250
    min_slack_ns: 0
