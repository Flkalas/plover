netlist: ../netlist/blocks/cpld_gpr_ctrl.yaml
timing: typ
duration_ns: 200
stimulus:
  - at_ns: 0
    set:
      net_reg_we: 0
      net_reg_sel0: 0
      net_reg_sel1: 0
  - at_ns: 50
    set:
      net_reg_sel0: 1
      net_reg_sel1: 0
  - at_ns: 100
    set:
      net_reg_sel0: 0
      net_reg_sel1: 1
      net_reg_we: 1
expect:
  - at_ns: 20
    net_w_sel0: 0
    net_w_sel1: 0
    net_r_sel_a0: 0
    net_r_sel_a1: 0
    net_r_sel_b0: 0
    net_r_sel_b1: 0
  - at_ns: 70
    net_w_sel0: 0
    net_w_sel1: 0
    net_r_sel_a0: 1
    net_r_sel_a1: 0
    net_r_sel_b0: 1
    net_r_sel_b1: 0
  - at_ns: 120
    net_w_sel0: 0
    net_w_sel1: 1
    net_r_sel_a0: 0
    net_r_sel_a1: 1
    net_r_sel_b0: 0
    net_r_sel_b1: 1
