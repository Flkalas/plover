netlist: ../netlist/blocks/cpld_system_ctrl.yaml
timing: typ
duration_ns: 400
stimulus:
  - at_ns: 0
    set:
      net_reset_n: 1
      net_map_mode: 0
      net_reg_we: 0
      net_opc0: 1
      net_opc1: 0
      net_opc2: 0
      net_opc3: 0
      net_ph0: 0
      net_ph1: 0
      net_a0: 0
      net_a1: 0
      net_a2: 0
      net_a3: 0
      net_a4: 0
      net_a5: 0
      net_a6: 0
      net_a7: 0
      net_a8: 0
      net_a9: 0
      net_a10: 0
      net_a11: 0
      net_a12: 0
      net_a13: 0
      net_a14: 0
      net_a15: 0
  - at_ns: 50
    set:
      net_ph0: 1
      net_ph1: 0
  - at_ns: 100
    set:
      net_ph0: 0
      net_ph1: 1
      net_reg_we: 1
  - at_ns: 150
    set:
      net_reset_n: 0
expect:
  - at_ns: 20
    net_reg_sel0: 0
    net_reg_sel1: 0
    net_load_r0: 0
  - at_ns: 70
    net_reg_sel0: 1
    net_reg_sel1: 0
    net_load_r1: 0
  - at_ns: 120
    net_reg_sel0: 0
    net_reg_sel1: 1
    net_load_r2: 1
    net_load_r0: 0
    net_load_r1: 0
    net_load_r3: 0
  - at_ns: 170
    net_addr_force_fffc: 1
