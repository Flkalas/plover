netlist: ../../netlist/blocks/cpld_gpr_ctrl.yaml
driver: stimulus
stimulus:
  - at_phase: 0
    set:
      net_reg_we: 0
      net_reg_sel0: 0
      net_reg_sel1: 0
  - at_phase: 1
    set:
      net_reg_we: 0
      net_reg_sel0: 1
      net_reg_sel1: 0
  - at_phase: 2
    set:
      net_reg_we: 1
      net_reg_sel0: 0
      net_reg_sel1: 1
expect:
  - at_phase: 0
    net_w_sel0: 0
    net_w_sel1: 0
    net_r_sel_a0: 0
    net_r_sel_a1: 0
  - at_phase: 1
    net_w_sel0: 0
    net_w_sel1: 0
    net_r_sel_a0: 1
    net_r_sel_a1: 0
  - at_phase: 2
    net_w_sel0: 0
    net_w_sel1: 1
    net_r_sel_a0: 0
    net_r_sel_a1: 1
