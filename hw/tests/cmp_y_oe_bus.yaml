# CMP datapath + CW Y_OE → data bus buffer (Y_BUS_BUF).
# A=0x10 B=0x0F → CMP Y=0x01 (y0=1). Y_OE=1: net_d0 follows net_y0; Y_OE=0: net_d0=Z.
netlist: ../netlist/blocks/cmp_y_oe_bus.yaml
timing: max
duration_ns: 1200
stimulus:
  - at_ns: 0
    set:
      net_a0: 0
      net_a1: 0
      net_a2: 0
      net_a3: 0
      net_a4: 0
      net_a5: 0
      net_a6: 0
      net_a7: 1
      net_b0: 1
      net_b1: 1
      net_b2: 1
      net_b3: 1
      net_b4: 0
      net_b5: 0
      net_b6: 0
      net_b7: 0
      net_cin: 1
      net_b_sel: 1
      net_b_const_sel: 0
      net_153_s0: 0
      net_153_s1: 0
      net_lgc0: 0
      net_lgc1: 0
      net_lgc2: 0
      net_lgc3: 0
      net_y_oe: 1
  - at_ns: 700
    set:
      net_y_oe: 0
expect:
  - at_ns: 600
    net_y0: 1
    net_d0: 1
  - at_ns: 900
    net_y0: 1
checks:
  - type: y_bus_gate
    y_net: net_y0
    d_net: net_d0
    y_oe: 1
    at_ns: 600
  - type: y_bus_gate
    y_net: net_y0
    d_net: net_d0
    y_oe: 0
    at_ns: 900
