netlist: ../netlist/blocks/cpu_datapath_p2_clock.yaml
timing: max
duration_ns: 2500
rom_image_file: ../fixtures/rom/clock_add_demo/rom_words.hex
stimulus:
  - at_ns: 0
    set:
      net_cmp_n: 1
expect:
  - at_ns: 1900
    net_r2_q0: 0
    net_r2_q1: 1
    net_r2_q2: 0
    net_r2_q3: 0
    net_r2_q4: 0
    net_r2_q5: 0
    net_r2_q6: 0
    net_r2_q7: 0
checks:
  - type: frequency
    signal: net_clk2
    target_hz: 2000000
    tolerance_pct: 5
  - type: setup_hold
  - type: slack
    path: [U_ROM.D12, U_DEC_04_1.A, U_DEC_04_1.Y, U_ALU_153_0.1Y, U_REG_R2.D0, U_REG_R2.CP, U_REG_R2.Q0]
    budget_ns: 250
    min_slack_ns: 0
