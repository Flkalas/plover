netlist: ../netlist/blocks/cpu_datapath_p1_view.yaml
timing: max
duration_ns: 2500
stimulus:
  - at_ns: 0
    set:
      net_cmp_n: 1
      net_alu_op0: 1
      net_alu_op1: 0
      net_alu_op2: 0
      net_alu_op3: 1
      net_bus_en0: 0
      net_bus_en1: 0
      net_dst_reg0: 0
      net_dst_reg1: 0
      net_src_reg0: 0
      net_src_reg1: 0
  - at_ns: 500
    set:
      net_alu_op0: 1
      net_alu_op1: 0
      net_alu_op2: 0
      net_alu_op3: 1
      net_bus_en0: 0
      net_bus_en1: 0
      net_dst_reg0: 0
      net_dst_reg1: 1
      net_src_reg0: 0
      net_src_reg1: 1
  - at_ns: 1000
    set:
      net_alu_op0: 1
      net_alu_op1: 0
      net_alu_op2: 0
      net_alu_op3: 1
      net_bus_en0: 0
      net_bus_en1: 0
      net_dst_reg0: 0
      net_dst_reg1: 1
      net_src_reg0: 0
      net_src_reg1: 1
  - at_ns: 1500
    set:
      net_alu_op0: 1
      net_alu_op1: 0
      net_alu_op2: 0
      net_alu_op3: 0
      net_bus_en0: 0
      net_bus_en1: 0
      net_dst_reg0: 0
      net_dst_reg1: 1
      net_src_reg0: 0
      net_src_reg1: 0
expect:
  - at_ns: 1900
    net_r2_q0: 0
    net_r2_q1: 1
checks:
  - type: frequency
    signal: net_clk2
    target_hz: 2000000
    tolerance_pct: 5
  - type: setup_hold
