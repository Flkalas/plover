# Spot test: CPLD 3-phase ADD sequencer (cpld_3fixed + dec_cpld_seq)
#
# Models macro ADD ph0/ph1/ph2 @ 2 MHz (250 ns half-period). CPLD FSM drives
# fixed R0?’A, R1?’B reads; execute phase asserts ADD controls (no Flash row).
# Registered CPLD ctrl adds +1 CLK setup vs comb CW ??still within 250 ns budget.
netlist: ../netlist/blocks/alu_b3.yaml
timing: max
duration_ns: 800
stimulus:
  # ph0: R0 ??A (0x50)
  - at_ns: 0
    set:
      net_a0: 0
      net_a1: 0
      net_a2: 0
      net_a3: 0
      net_a4: 1
      net_a5: 0
      net_a6: 1
      net_a7: 0
      net_b0: 0
      net_b1: 0
      net_b2: 0
      net_b3: 0
      net_b4: 0
      net_b5: 0
      net_b6: 0
      net_b7: 0
      net_cin: 0
      net_153_s0: 0
      net_153_s1: 0
      net_b_sel: 0
      net_b_const_sel: 0
      net_lgc0: 1
      net_lgc1: 1
      net_lgc2: 1
      net_lgc3: 1
      net_clk: 0
  # ph1: R1 ??B (0x33) ??PASS/B mux
  - at_ns: 250
    set:
      net_b0: 1
      net_b1: 1
      net_b2: 0
      net_b3: 0
      net_b4: 0
      net_b5: 1
      net_b6: 1
      net_b7: 0
      net_b_sel: 1
      net_lgc0: 1
      net_lgc1: 1
      net_lgc2: 1
      net_lgc3: 1
  # ph2: ADD execute (cin=0, ADD lgc=0000)
  - at_ns: 500
    set:
      net_cin: 0
      net_b_sel: 1
      net_lgc0: 0
      net_lgc1: 0
      net_lgc2: 0
      net_lgc3: 0
expect:
  - at_ns: 750
    net_y0: 1
    net_y1: 1
    net_y2: 0
    net_y3: 0
    net_y4: 0
    net_y5: 0
    net_y6: 0
    net_y7: 1
checks:
  - type: path_delay
    from_net: net_lgc0
    to_net: net_y0
    after_ns: 500
    max_delay_ns: 250
