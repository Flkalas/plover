netlist: ../netlist/blocks/regfile.yaml
timing: max
duration_ns: 2000
stimulus:
  - at_ns: 0
    set:
      net_y0: 0
      net_y1: 1
      net_y2: 0
      net_y3: 0
      net_y4: 0
      net_y5: 0
      net_y6: 0
      net_y7: 0
      net_dst_reg0: 0
      net_dst_reg1: 0
      net_src_reg0: 0
      net_src_reg1: 0
      net_cmp_n: 1
      net_bus_en0: 0
      net_bus_en1: 0
      net_clk2: 0
  - at_ns: 100
    set:
      net_clk2: 1
  - at_ns: 200
    set:
      net_clk2: 0
      net_y0: 0
      net_y1: 0
      net_y2: 1
      net_y3: 1
      net_y4: 0
      net_y5: 0
      net_y6: 0
      net_y7: 0
      net_dst_reg0: 0
      net_dst_reg1: 1
  - at_ns: 300
    set:
      net_clk2: 1
  - at_ns: 400
    set:
      net_clk2: 0
      net_src_reg0: 0
      net_src_reg1: 0
      net_dst_reg0: 0
      net_dst_reg1: 1
expect:
  - at_ns: 500
    net_a0: 0
    net_a1: 1
    net_a2: 0
    net_a3: 0
  - at_ns: 500
    net_b0: 0
    net_b1: 0
    net_b2: 1
    net_b3: 1
