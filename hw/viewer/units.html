<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>ALU8 gate connectivity</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    body { display: grid; grid-template-columns: 240px 1fr; gap: 0; min-height: 100vh; margin: 0; }
    #sidebar { background: #161b22; border-right: 1px solid #30363d; padding: 12px; overflow: auto; }
    #sidebar h1 { font-size: 16px; margin: 0 0 8px; color: #e6edf3; }
    #sidebar p { font-size: 12px; color: #8b949e; margin: 0 0 12px; }
    .cat { margin-bottom: 12px; }
    .cat-title { font-size: 11px; font-weight: 600; color: #8b949e; text-transform: uppercase; margin-bottom: 4px; }
    .unit-btn {
      display: block; width: 100%; text-align: left; margin: 2px 0; padding: 6px 8px;
      background: #21262d; color: #c9d1d9; border: 1px solid #30363d; border-radius: 4px;
      cursor: pointer; font: 12px system-ui;
    }
    .unit-btn:hover { border-color: #58a6ff; }
    .unit-btn.active { background: #1f3a5f; border-color: #58a6ff; color: #e6edf3; }
    .unit-btn.all-view { margin-bottom: 10px; font-weight: 600; }
    #main { display: flex; flex-direction: column; min-width: 0; min-height: 100vh; }
    #toolbar {
      padding: 8px 12px; background: #0d1117; border-bottom: 1px solid #30363d;
      font: 12px system-ui; color: #8b949e; flex-shrink: 0;
    }
    #toolbar strong { color: #e6edf3; }
    #schematic-host {
      flex: 1; overflow: auto; background: #0d1117;
      -webkit-user-select: none; user-select: none;
    }
    #schematic-host iframe { width: 100%; height: 100%; min-height: 560px; border: 0; background: #0d1117; }
    #load-hint { padding: 24px; color: #8b949e; font: 13px system-ui; }
    #manifest-file { margin-top: 8px; font-size: 11px; display: block; }
    .scope-tags { font-size: 11px; color: #8b949e; margin-top: 4px; }
  </style>
</head>
<body>
  <aside id="sidebar">
    <h1>ALU8 gates</h1>
    <p>Full gate connectivity + single-gate drill-down</p>
    <button type="button" class="unit-btn all-view" id="btn-all">All gates (full graph)</button>
    <label id="manifest-file">manifest.json
      <input type="file" id="file-manifest" accept=".json"/>
    </label>
    <div id="unit-list"></div>
  </aside>
  <main id="main">
    <div id="toolbar">
      <span id="unit-title">All gates</span>
      <div id="scope-tags" class="scope-tags"></div>
    </div>
    <div id="schematic-host">
      <div id="load-hint">
        Run <code>python -m hwsim export-units hw/netlist/blocks/alu8.yaml -o build/units --html --embed-manifest</code>
        then open <code>build/units/index.html</code>.
      </div>
    </div>
  </main>
  <script src="gate-graph-filter.js"></script>
  <script src="schematic-interactive.js"></script>
  <script>
    /* EMBED_MANIFEST */
    const listEl = document.getElementById('unit-list');
    const host = document.getElementById('schematic-host');
    const titleEl = document.getElementById('unit-title');
    const scopeEl = document.getElementById('scope-tags');
    let manifest = window.__UNITS_MANIFEST__ || null;
    let activeId = null;
    let baseUrl = '';
    let graphLoaded = false;

    function renderSidebar() {
      listEl.innerHTML = '';
      if (!manifest || !manifest.units) return;
      const byKind = {};
      manifest.units.forEach((u) => {
        const key = u.category || u.kind;
        (byKind[key] = byKind[key] || []).push(u);
      });
      Object.keys(byKind).sort().forEach((cat) => {
        const section = document.createElement('div');
        section.className = 'cat';
        section.innerHTML = '<div class="cat-title">' + cat + '</div>';
        byKind[cat].forEach((u) => {
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'unit-btn' + (u.id === activeId ? ' active' : '');
          btn.textContent = u.label;
          btn.title = u.id;
          btn.onclick = () => selectUnit(u);
          section.appendChild(btn);
        });
        listEl.appendChild(section);
      });
      document.getElementById('btn-all').classList.toggle('active', activeId === null);
    }

    function loadGraph(done) {
      const path = manifest.graph_html || manifest.graph_svg;
      if (!path) {
        host.innerHTML = '<div id="load-hint">manifest missing graph_html / graph_svg</div>';
        return;
      }
      if (manifest.graph_html) {
        host.innerHTML = '<iframe id="graph-frame" src="' + baseUrl + manifest.graph_html + '"></iframe>';
        document.getElementById('load-hint')?.remove();
        graphLoaded = true;
        const frame = document.getElementById('graph-frame');
        frame.onload = () => { if (done) done(frame); };
        if (frame.contentDocument) { if (done) done(frame); }
        return;
      }
      fetch(baseUrl + path)
        .then((r) => r.text())
        .then((text) => {
          host.innerHTML = text;
          document.getElementById('load-hint')?.remove();
          graphLoaded = true;
          if (window.initSchematicInteractive) initSchematicInteractive(host);
          if (done) done(null);
        });
    }

    function graphSvg(frame) {
      if (frame && frame.contentDocument) {
        return frame.contentDocument.querySelector('svg');
      }
      return host.querySelector('svg');
    }

    function clearHighlight() {
      const svg = graphSvg(document.getElementById('graph-frame'));
      if (!svg) return;
      svg.querySelectorAll('.gate-node, .wire-seg, .io-net, .port').forEach((el) => {
        el.style.opacity = '';
      });
      svg.querySelectorAll('.wire-seg').forEach((w) => w.setAttribute('stroke-width', '1.3'));
    }

    function showAll() {
      activeId = null;
      renderSidebar();
      titleEl.textContent = 'All gates';
      scopeEl.textContent = (manifest.units || []).length + ' gates · full connectivity';
      const run = () => clearHighlight();
      if (!graphLoaded) loadGraph(run);
      else run();
    }

    function selectUnit(u) {
      activeId = u.id;
      renderSidebar();
      titleEl.innerHTML = '<strong>' + u.label + '</strong> · ' + u.kind;
      scopeEl.textContent = (u.nets || []).length + ' nets · highlight on full graph';

      const apply = (frame) => {
        const svg = graphSvg(frame);
        if (svg && window.applyGateHighlight) applyGateHighlight(svg, u);
      };

      if (!graphLoaded) loadGraph(apply);
      else apply(document.getElementById('graph-frame'));
    }

    function applyManifest(data, base) {
      manifest = data;
      baseUrl = base || '';
      renderSidebar();
      showAll();
    }

    document.getElementById('btn-all').onclick = showAll;
    document.getElementById('file-manifest').addEventListener('change', (e) => {
      const f = e.target.files[0];
      if (!f) return;
      const r = new FileReader();
      r.onload = () => { graphLoaded = false; applyManifest(JSON.parse(r.result), ''); };
      r.readAsText(f);
    });

    if (manifest) applyManifest(manifest, '');
    else fetch('manifest.json')
      .then((r) => r.ok ? r.json() : null)
      .then((data) => { if (data) applyManifest(data, ''); })
      .catch(() => {});
  </script>
</body>
</html>
