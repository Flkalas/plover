<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Plover schematic viewer</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    #schematic-host { overflow: auto; max-height: 85vh; background: #0d1117; border: 1px solid #30363d; border-radius: 6px;
      -webkit-user-select: none; user-select: none; }
    #schematic-host svg { display: block; -webkit-user-select: none; user-select: none; }
    #schematic-host text { pointer-events: none; }
    .zoom-bar { margin: 8px 0; }
    .zoom-bar button { margin-right: 6px; }
  </style>
</head>
<body>
  <header>
    <h1>Plover schematic viewer</h1>
    <p>Load <code>*.schematic.svg</code> from <code>python -m hwsim export-schematic …</code></p>
  </header>
  <section class="loads">
    <label>schematic SVG <input type="file" id="file-schematic" accept=".svg"/></label>
  </section>
  <section class="zoom-bar panel">
    <button type="button" id="zin">Zoom +</button>
    <button type="button" id="zout">Zoom -</button>
    <button type="button" id="zreset">Reset</button>
    <span id="zoom-label" class="title"></span>
    <span id="sel-status" class="title" style="margin-left:12px;opacity:.85">Click to select · Esc clears</span>
  </section>
  <section class="panel">
    <h2>Schematic</h2>
    <div id="schematic-host"></div>
  </section>
  <script src="schematic-interactive.js"></script>
  <script>
    const host = document.getElementById('schematic-host');
    let scale = 1;
    function applyScale() {
      const svg = host.querySelector('svg');
      if (svg) {
        svg.style.transformOrigin = '0 0';
        svg.style.transform = 'scale(' + scale + ')';
      }
      document.getElementById('zoom-label').textContent = Math.round(scale * 100) + '%';
    }
    document.getElementById('zin').onclick = () => { scale *= 1.15; applyScale(); };
    document.getElementById('zout').onclick = () => { scale /= 1.15; applyScale(); };
    document.getElementById('zreset').onclick = () => { scale = 1; applyScale(); };
    document.getElementById('file-schematic').addEventListener('change', (e) => {
      const f = e.target.files[0];
      if (!f) return;
      const r = new FileReader();
      r.onload = () => {
        host.innerHTML = r.result;
        scale = 1;
        applyScale();
        if (window.initSchematicInteractive) initSchematicInteractive(host);
      };
      r.readAsText(f);
    });
  </script>
</body>
</html>
