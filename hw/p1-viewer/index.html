<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Plover Phase1 datapath viewer</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <header>
    <h1>Phase1 datapath viewer</h1>
    <p>Interactive CW → decode → MUX → ALU → regfile (hwsim gate-level). Run: <code>python -m hwsim serve</code></p>
  </header>

  <section class="toolbar panel">
    <span class="label">Preset</span>
    <button type="button" id="btn-preset-demo" class="btn">clock_add_demo</button>
    <button type="button" id="btn-simulate" class="btn primary">Simulate</button>
    <button type="button" id="btn-step" class="btn">+1 cycle</button>
    <span id="status" class="status"></span>
  </section>

  <div class="grid-top">
    <section class="panel cw-panel">
      <h2>CW inputs</h2>
      <label>alu_op
        <select id="alu-op"></select>
      </label>
      <label>src_reg
        <select id="src-reg">
          <option value="0">R0</option>
          <option value="1">R1</option>
          <option value="2">R2</option>
          <option value="3">R3</option>
        </select>
      </label>
      <label>dst_reg
        <select id="dst-reg">
          <option value="0">R0</option>
          <option value="1">R1</option>
          <option value="2" selected>R2</option>
          <option value="3">R3</option>
        </select>
      </label>
      <label>bus_en
        <select id="bus-en">
          <option value="0">00 LOCAL</option>
          <option value="3">11 IMM</option>
        </select>
      </label>
      <p class="hint">Cycle queue: <span id="cycle-count">0</span> · period 500 ns</p>
      <button type="button" id="btn-queue" class="btn">Queue cycle</button>
      <button type="button" id="btn-clear" class="btn">Clear queue</button>
    </section>

    <section class="panel">
      <h2>Datapath</h2>
      <canvas id="datapath" width="640" height="280"></canvas>
      <div class="slider-row">
        <label>Time <input type="range" id="time-slider" min="0" max="2500" value="0"/> <span id="time-label">0 ns</span></label>
      </div>
    </section>
  </div>

  <section class="panel" id="outputs">
    <h2>Outputs</h2>
    <div id="reg-display" class="reg-grid"></div>
    <p>ALU Y: <code id="alu-y">—</code> · cmp_n: <code id="cmp-n">—</code></p>
    <div id="violations"></div>
  </section>

  <section class="panel">
    <h2>Checks</h2>
    <table id="checks"><thead><tr><th>Type</th><th>Status</th><th>Detail</th></tr></thead><tbody></tbody></table>
  </section>

  <div class="grid-bottom">
    <section class="panel wave-panel">
      <h2>Waveforms</h2>
      <div class="wave-controls">
        <label>Zoom window (ns) <input type="number" id="zoom-window" value="1500" min="500" max="5000" step="500"/></label>
        <label><input type="checkbox" id="group-waves" checked/> Group nets</label>
      </div>
      <canvas id="waves" width="900" height="400"></canvas>
      <div id="wave-legend"></div>
    </section>
    <section class="panel wiring-panel">
      <h2>Wiring (filtered)</h2>
      <div id="svg-host"></div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
